name: Bug Report
description: Defect report for backlog tracking
title: "[Bug]: "
labels: ["backlog", "bug", "todo"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem summary
      placeholder: App crashes when opening Tour Detail on Android 13.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app
        2. Login
        3. Tap a tour card
        4. Observe crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Tour Detail opens without crash.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: App closes and returns to launcher.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - S1 - Blocker
        - S2 - Major
        - S3 - Minor
        - S4 - Cosmetic
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Android 13, Pixel 6, app 1.0.0
    validations:
      required: true
